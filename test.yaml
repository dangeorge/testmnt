---
- name: Check if file is present in /mnt
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    target_file: "/mnt/abc.txt"   # change this to the actual file path

  tasks:
    - name: Check if file exists
      stat:
        path: "{{ target_file }}"
      register: file_check

    - name: Report file presence
      debug:
        msg: "File {{ target_file }} {{ 'EXISTS' if file_check.stat.exists else 'DOES NOT EXIST' }}"

    - name: Sleep for 2 minutes
      ansible.builtin.pause:
        minutes: 2

    - name: Fail if file is missing
      fail:
        msg: "Required file {{ target_file }} not found!"
      when: not file_check.stat.exists
